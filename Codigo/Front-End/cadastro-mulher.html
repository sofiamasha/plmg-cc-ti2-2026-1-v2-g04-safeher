<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHer</title>
    <link rel="stylesheet" href="global.css">
</head>
<body>
    <main>
        <div class="auth-container">
            <div>
                <img src="resources/images/woman_illustration.jpeg" class="auth-illustration" alt="Mulher">
            </div>
            <div class="auth-form-wrapper">
                <a href="escolha-cadastro.html" style="position: absolute; top: 30px; right: 40px; color: var(--text-gray); font-size: 24px;"><i class="fa-solid fa-xmark"></i></a>
                
                <div class="auth-card" style="max-width: 400px;">
                    <div class="auth-shield">
                        <img src="resources/images/logo-escudo.png" alt="Escudo SafeHer">
                    </div>
                    <h2 style="margin-top: 10px;">Cadastro</h2>
                    <form action="index.html">
                        <label for="nome" class="sh-label">Nome Completo</label>
                        <input type="text" id="nome" class="sh-input" placeholder="Seu nome">
                        
                        <label for="email" class="sh-label">Email</label>
                        <input type="email" id="email" class="sh-input" placeholder="seuemail@exemplo.com">
                        
                        <label for="telefone" class="sh-label">Telefone</label>
                        <input type="text" id="telefone" class="sh-input" placeholder="(11) 99999-9999">
                        
                        <label for="cpf" class="sh-label">CPF</label>
                        <input type="text" id="cpf" class="sh-input" placeholder="000.000.000-00">
                        
                        <label for="senha" class="sh-label">Senha</label>
                        <input type="password" id="senha" class="sh-input" placeholder="********">
                        
                        <div style="margin-top: 20px;">
                            <button type="submit" class="sh-btn">Cadastrar</button>
                            <a href="login.html" class="auth-link-bottom" style="margin-bottom: 10px;">Já tenho uma conta</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
