<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHer - Cadastro de Empresa</title>
    <link rel="stylesheet" href="global.css">
    <style>
        body.signup-page {
            background: #fdf8fb;
            overflow-x: hidden;
        }

        .auth-container {
            min-height: 100vh;
            height: auto;
            grid-template-columns: minmax(360px, 0.95fr) minmax(460px, 1.05fr);
            align-items: stretch;
            background: #fdf8fb;
        }

        .auth-illustration-wrapper {
            position: relative;
            min-height: 100vh;
            overflow: hidden;
        }

        .auth-illustration-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(179, 27, 110, 0.04), rgba(179, 27, 110, 0.3));
        }
        
        .auth-form-wrapper {
            position: relative;
            width: 100%;
            min-height: 100vh;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 56px 36px;
            box-sizing: border-box;
            background: #fdf8fb;
        }

        .signup-close {
            position: absolute;
            top: 24px;
            right: 28px;
            color: var(--text-gray);
            font-size: 22px;
            text-decoration: none;
            transition: var(--transition);
        }

        .signup-close:hover {
            color: var(--pink-primary);
        }

        .auth-card {
            width: 100%;
            max-width: 540px;
            margin: 0;
            padding: 56px 34px 34px;
            box-sizing: border-box;
            border-radius: 8px;
            background: #ffffff;
            color: var(--text-dark);
            border: 2px solid #f0d5e2;
            box-shadow: 0 18px 46px rgba(179, 27, 110, 0.12);
        }

        .auth-card h2 {
            color: var(--pink-dark);
            font-size: 27px;
            margin-bottom: 8px;
        }

        .signup-subtitle {
            font-size: 14px;
            color: var(--text-gray);
            line-height: 1.6;
            margin: 0 auto 22px;
            text-align: center;
            max-width: 430px;
        }

        .auth-card .sh-label {
            color: var(--text-dark);
        }

        .auth-card .sh-input {
            background: #ffffff;
            border: 1px solid #ead3de;
            color: var(--text-dark);
            margin-bottom: 14px;
        }

        .auth-card .sh-input::placeholder {
            color: #b9a7b0;
        }

        .auth-card .sh-input:focus {
            border-color: var(--pink-primary);
            box-shadow: 0 0 0 3px rgba(227, 58, 127, 0.12);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .form-field {
            min-width: 0;
        }

        .signup-note {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 14px;
            margin: 4px 0 14px;
            border-radius: 8px;
            background: var(--pink-lighter);
            color: var(--text-gray);
            font-size: 12.5px;
            line-height: 1.5;
        }

        .signup-note i {
            color: var(--pink-primary);
            margin-top: 2px;
        }

        .auth-card .sh-btn {
            min-height: 50px;
            margin-top: 8px;
            width: 100%;
            border-radius: 8px;
            color: #ffffff !important;
        }

        .auth-card .auth-link-bottom {
            color: var(--text-gray);
            font-size: 13px;
            font-weight: 700;
        }

        .auth-card .auth-link-bottom:hover {
            color: var(--pink-primary);
        }

        @media (max-width: 860px) {
            .auth-container {
                grid-template-columns: 1fr;
            }

            .auth-illustration-wrapper {
                display: none;
            }

            .auth-form-wrapper {
                padding: 54px 16px 34px;
            }

            .auth-card {
                padding: 50px 20px 26px;
            }
        }

        @media (max-width: 560px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }
    </style>
</head>
<body class="signup-page">
    <div id="toast-container"></div>
    <main>
        <div class="auth-container">
            <div class="auth-illustration-wrapper">
                <img src="resources/images/buildings_illustration.jpeg" class="auth-illustration" alt="Empresas parceiras" onerror="this.style.display='none'">
            </div>
            <div class="auth-form-wrapper">
                <a href="escolha-cadastro.html" class="signup-close" title="Voltar" aria-label="Voltar">
                    <i class="fa-solid fa-xmark"></i>
                </a>

                <div class="auth-card">
                    <div class="auth-shield">
                        <img src="resources/images/logo-escudo.png" alt="Escudo SafeHer">
                    </div>
                    <h2>Criar conta de Empresa</h2>
                    <p class="signup-subtitle">Responda avaliações e denúncias, acompanhe a reputação da sua marca e demonstre compromisso com ambientes seguros.</p>
                    
                    <form id="formCadastroEmpresa" onsubmit="return false;">
                        <label for="nome" class="sh-label">Nome da Empresa</label>
                        <input type="text" id="nome" class="sh-input" placeholder="Razão Social ou Nome Fantasia" autocomplete="name">

                        <div class="form-row">
                            <div class="form-field">
                                <label for="cnpj" class="sh-label">CNPJ</label>
                                <input type="text" id="cnpj" class="sh-input" placeholder="00.000.000/0001-00">
                            </div>
                            <div class="form-field">
                                <label for="cep" class="sh-label">CEP</label>
                                <input type="text" id="cep" class="sh-input" placeholder="00000-000">
                            </div>
                        </div>

                        <label for="endereco" class="sh-label">Endereço Completo</label>
                        <input type="text" id="endereco" class="sh-input" placeholder="Av. Paulista, 1000 - Cj 12">

                        <div class="form-row">
                            <div class="form-field">
                                <label for="email" class="sh-label">Email Corporativo</label>
                                <input type="email" id="email" class="sh-input" placeholder="contato@empresa.com" autocomplete="email">
                            </div>
                            <div class="form-field">
                                <label for="telefone" class="sh-label">Telefone de Contato</label>
                                <input type="tel" id="telefone" class="sh-input" placeholder="(11) 99999-9999" autocomplete="tel">
                            </div>
                        </div>

                        <label for="senha" class="sh-label">Senha</label>
                        <input type="password" id="senha" class="sh-input" placeholder="Mínimo 6 caracteres" autocomplete="new-password">

                        <div class="signup-note">
                            <i class="fa-solid fa-circle-check"></i>
                            <span>Após o cadastro, sua empresa poderá acessar o painel para acompanhar avaliações e responder relatos oficialmente.</span>
                        </div>

                        <button type="submit" class="sh-btn" onclick="cadastrarEmpresaForm()">
                            <i class="fa-solid fa-building-circle-plus"></i> Criar conta de Empresa
                        </button>
                        <a href="login.html?perfil=empresa" class="auth-link-bottom">Já tenho uma conta — Entrar</a>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="api.js"></script>
    <script src="usuario-session.js"></script>
    <script>
        async function cadastrarEmpresaForm() {
            const nome     = document.getElementById('nome').value.trim();
            const cnpj     = document.getElementById('cnpj').value.trim();
            const cep      = document.getElementById('cep').value.trim();
            const endereco = document.getElementById('endereco').value.trim();
            const email    = document.getElementById('email').value.trim();
            const telefone = document.getElementById('telefone').value.trim();
            const senha    = document.getElementById('senha').value;

            if (!nome || !email || !senha || !cnpj) {
                showToast('Preencha ao menos Nome, CNPJ, Email e Senha.', 'error');
                return;
            }
            if (senha.length < 6) {
                showToast('A senha deve ter ao menos 6 caracteres.', 'error');
                return;
            }

            const empresa = {
                id: Math.floor(Math.random() * 100000),
                nome: nome,
                cnpj: cnpj,
                cep: cep,
                endereco: endereco,
                email: email,
                telefone: telefone,
                senha: senha,
                plano: 'Free',
                indice: 5.0
            };

            try {
                await cadastrarEmpresa(empresa);
                showToast('Empresa cadastrada com sucesso! Redirecionando...', 'success');
                setTimeout(() => window.location.href = 'login.html', 1500);
            } catch (e) {
                showToast('Erro ao cadastrar empresa: ' + e.message, 'error');
            }
        }
    </script>
</body>
</html>
