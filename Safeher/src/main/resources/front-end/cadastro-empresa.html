<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHer</title>
    <link rel="stylesheet" href="global.css">
</head>
<body>
    <main>
        <div class="auth-container">
            <div>
                <img src="resources/images/buildings_illustration.jpeg" class="auth-illustration" alt="Prédios">
            </div>
            <div class="auth-form-wrapper">
                <a href="escolha-cadastro.html" style="position: absolute; top: 30px; right: 40px; color: var(--text-gray); font-size: 24px;"><i class="fa-solid fa-xmark"></i></a>
                
                <div class="auth-card" style="max-width: 480px;">
                    <div class="auth-shield">
                        <img src="resources/images/logo-escudo.png" alt="Escudo SafeHer">
                    </div>
                    <h2 style="margin-top: 10px">Cadastro</h2>
                    <form id="formCadastroEmpresa" onsubmit="return false;">
                        <label for="cnpj" class="sh-label">CNPJ</label>
                        <input type="text" id="cnpj" class="sh-input" placeholder="00.000.000/0000-00">
                        
                        <label for="razaoSocial" class="sh-label">Razão Social</label>
                        <input type="text" id="razaoSocial" class="sh-input" placeholder="Nome oficial da empresa">
                        
                        <div style="display: flex; gap: 15px;">
                            <div style="flex: 1;">
                                <label for="cep" class="sh-label">CEP</label>
                                <input type="text" id="cep" class="sh-input" placeholder="00000-000">
                            </div>
                            <div style="flex: 2;">
                                <label for="endereco" class="sh-label">Endereço Completo</label>
                                <input type="text" id="endereco" class="sh-input" placeholder="Rua, Número, Bairro">
                            </div>
                        </div>
                        
                        <label for="email" class="sh-label">E-mail Corporativo</label>
                        <input type="email" id="email" class="sh-input" placeholder="contato@empresa.com">
                        
                        <label for="telefone" class="sh-label">Telefone</label>
                        <input type="text" id="telefone" class="sh-input" placeholder="(11) 00000-0000">

                        <label for="senha" class="sh-label">Senha</label>
                        <input type="password" id="senha" class="sh-input" placeholder="Crie uma senha segura">
                        
                        <div style="margin: 15px 0 25px; font-size: 11px; display: flex; gap: 10px;">
                            <i class="fa-solid fa-paperclip" style="font-size: 16px;"></i>
                            <p>Anexe aqui todos os documentos necessários<br>(Cartão CNPJ, Contrato Social, etc.)</p>
                        </div>
                        
                        <button type="submit" class="sh-btn" onclick="cadastrarEmpresaForm()">Cadastrar</button>
                        <a href="login.html" class="auth-link-bottom">Já tenho uma conta</a>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script src="api.js"></script>
    <script src="usuario-session.js"></script>
    <script>
        async function cadastrarEmpresaForm() {
            const nome = document.getElementById('razaoSocial').value;
            const cnpj = document.getElementById('cnpj').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            if (!nome.trim() || !cnpj.trim() || !email.trim() || !senha.trim()) {
                alert('Preencha os campos obrigatórios: CNPJ, Razão Social, E-mail e Senha.');
                return;
            }

            const empresa = {
                id: Math.floor(Math.random() * 100000),
                nome: nome,
                indice: 0.0,
                cnpj: cnpj,
                cep: document.getElementById('cep').value,
                endereco: document.getElementById('endereco').value,
                email: email,
                telefone: document.getElementById('telefone').value,
                senha: senha
            };
            try {
                await cadastrarEmpresa(empresa);
                alert('Empresa cadastrada com sucesso!');
                window.location.href = 'login.html';
            } catch (e) {
                alert('Erro ao cadastrar empresa: ' + e.message);
            }
        }
    </script>
</body>
</html>
