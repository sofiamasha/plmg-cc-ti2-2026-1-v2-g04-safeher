<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHer - Cadastro de Empresa</title>
    <link rel="stylesheet" href="global.css">
</head>
<body>
    <div id="toast-container"></div>
    <main>
        <div class="auth-container">
            <div>
                <img src="resources/images/buildings_illustration.jpeg" class="auth-illustration" alt="Empresas parceiras" onerror="this.style.display='none'">
            </div>
            <div class="auth-form-wrapper" style="position:relative; max-height: 95vh; overflow-y: auto;">
                <a href="escolha-cadastro.html" style="position:absolute;top:28px;right:32px;color:var(--text-gray);font-size:22px;text-decoration:none;transition:0.2s;" title="Voltar">
                    <i class="fa-solid fa-xmark"></i>
                </a>

                <div class="auth-card" style="margin-top: 40px; margin-bottom: 40px;">
                    <div class="auth-shield">
                        <img src="resources/images/logo-escudo.png" alt="Escudo SafeHer">
                    </div>
                    <h2>Criar conta de Empresa</h2>
                    <p style="font-size:13.5px; color:var(--text-gray); margin-bottom: 20px; text-align: center;">Junte-se à SafeHer para promover um ambiente mais equitativo, inclusivo e seguro para todas as mulheres.</p>
                    
                    <form id="formCadastroEmpresa" onsubmit="return false;">
                        <label for="nome" class="sh-label">Nome da Empresa</label>
                        <input type="text" id="nome" class="sh-input" placeholder="Razão Social ou Nome Fantasia" autocomplete="name">

                        <label for="cnpj" class="sh-label">CNPJ</label>
                        <input type="text" id="cnpj" class="sh-input" placeholder="00.000.000/0001-00">

                        <label for="cep" class="sh-label">CEP</label>
                        <input type="text" id="cep" class="sh-input" placeholder="00000-000">

                        <label for="endereco" class="sh-label">Endereço Completo</label>
                        <input type="text" id="endereco" class="sh-input" placeholder="Av. Paulista, 1000 - Cj 12">

                        <label for="email" class="sh-label">Email Corporativo</label>
                        <input type="email" id="email" class="sh-input" placeholder="contato@empresa.com" autocomplete="email">

                        <label for="telefone" class="sh-label">Telefone de Contato</label>
                        <input type="tel" id="telefone" class="sh-input" placeholder="(11) 99999-9999" autocomplete="tel">

                        <label for="senha" class="sh-label">Senha</label>
                        <input type="password" id="senha" class="sh-input" placeholder="Mínimo 6 caracteres" autocomplete="new-password">

                        <button type="submit" class="sh-btn" onclick="cadastrarEmpresaForm()" style="margin-top: 15px; width: 100%;">
                            <i class="fa-solid fa-building-circle-plus"></i> Criar conta de Empresa
                        </button>
                        <a href="login.html" class="auth-link-bottom" style="display: block; text-align: center; margin-top: 15px;">Já tenho uma conta — Entrar</a>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="api.js"></script>
    <script src="usuario-session.js"></script>
    <script>
        async function cadastrarEmpresaForm() {
            const nome     = document.getElementById('nome').value.trim();
            const cnpj     = document.getElementById('cnpj').value.trim();
            const cep      = document.getElementById('cep').value.trim();
            const endereco = document.getElementById('endereco').value.trim();
            const email    = document.getElementById('email').value.trim();
            const telefone = document.getElementById('telefone').value.trim();
            const senha    = document.getElementById('senha').value;

            if (!nome || !email || !senha || !cnpj) {
                showToast('Preencha ao menos Nome, CNPJ, Email e Senha.', 'error');
                return;
            }
            if (senha.length < 6) {
                showToast('A senha deve ter ao menos 6 caracteres.', 'error');
                return;
            }

            const empresa = {
                id: Math.floor(Math.random() * 100000),
                nome: nome,
                cnpj: cnpj,
                cep: cep,
                endereco: endereco,
                email: email,
                telefone: telefone,
                senha: senha,
                plano: 'Free',
                indice: 5.0
            };

            try {
                await cadastrarEmpresa(empresa);
                showToast('Empresa cadastrada com sucesso! Redirecionando...', 'success');
                setTimeout(() => window.location.href = 'login.html', 1500);
            } catch (e) {
                showToast('Erro ao cadastrar empresa: ' + e.message, 'error');
            }
        }
    </script>
</body>
</html>
