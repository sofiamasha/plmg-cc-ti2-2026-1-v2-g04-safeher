<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHer</title>
    <link rel="stylesheet" href="global.css">
</head>
<body>
    <div id="toast-container"></div>
    <main>
        <div class="auth-container">
            <div>
                <img src="resources/images/woman_illustration.jpeg" class="auth-illustration" alt="Mulher confiante">
            </div>
            <div class="auth-form-wrapper" style="position:relative;">
                <a href="escolha-cadastro.html" style="position:absolute;top:28px;right:32px;color:var(--text-gray);font-size:22px;text-decoration:none;transition:0.2s;" title="Voltar">
                    <i class="fa-solid fa-xmark"></i>
                </a>

                <div class="auth-card">
                    <div class="auth-shield">
                        <img src="resources/images/logo-escudo.png" alt="Escudo SafeHer">
                    </div>
                    <h2>Criar conta</h2>
                    <form id="formCadastroMulher" onsubmit="return false;">
                        <label for="nome" class="sh-label">Nome Completo</label>
                        <input type="text" id="nome" class="sh-input" placeholder="Seu nome completo" autocomplete="name">

                        <label for="email" class="sh-label">Email</label>
                        <input type="email" id="email" class="sh-input" placeholder="seuemail@exemplo.com" autocomplete="email">

                        <label for="telefone" class="sh-label">Telefone</label>
                        <input type="tel" id="telefone" class="sh-input" placeholder="(11) 99999-9999" autocomplete="tel">

                        <label for="cpf" class="sh-label">CPF</label>
                        <input type="text" id="cpf" class="sh-input" placeholder="000.000.000-00">

                        <label for="senha" class="sh-label">Senha</label>
                        <input type="password" id="senha" class="sh-input" placeholder="Mínimo 6 caracteres" autocomplete="new-password">

                        <button type="submit" class="sh-btn" onclick="cadastrarMulher()">
                            <i class="fa-solid fa-user-plus"></i> Criar minha conta
                        </button>
                        <a href="login.html" class="auth-link-bottom">Já tenho uma conta — Entrar</a>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="api.js"></script>
    <script src="usuario-session.js"></script>
    <script>
        async function cadastrarMulher() {
            const nome  = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            if (!nome || !email || !senha) {
                showToast('Preencha nome, email e senha.', 'error');
                return;
            }
            if (senha.length < 6) {
                showToast('A senha deve ter ao menos 6 caracteres.', 'error');
                return;
            }
            const usuario = {
                id: Math.floor(Math.random() * 100000),
                nome: nome,
                email: email,
                senha: senha,
                data: new Date().toISOString().split('T')[0]
            };
            try {
                await cadastrarUsuario(usuario);
                showToast('Conta criada com sucesso! Redirecionando...', 'success');
                setTimeout(() => window.location.href = 'login.html', 1500);
            } catch (e) {
                showToast('Erro ao cadastrar: ' + e.message, 'error');
            }
        }
    </script>
</body>
</html>
